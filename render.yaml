services:
  - type: web
    name: suiviscolaire
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --log-file -
    envVars:
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: suiviscolaire.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://suiviscolaire.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: suiviscolaire-db
          property: connectionString

databases:
  - name: suiviscolaire-db
    databaseName: school
    user: school
